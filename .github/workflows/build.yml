name: Build and Validate

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-tag-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag matches package.json version ($PKG_VERSION)."

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=high

    - name: Run Lint
      run: npm run lint

    - name: Run Build
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Check Bundle Size
      run: npm run size

    - name: Verify Build Artifacts
      shell: bash
      run: |
        if [ ! -f dist/vitra.min.css ]; then
          echo "Build failed: dist/vitra.min.css not found!"
          exit 1
        fi
        if [ ! -f dist/vitra.min.js ]; then
          echo "Build failed: dist/vitra.min.js not found!"
          exit 1
        fi
        echo "Build succeeded."
