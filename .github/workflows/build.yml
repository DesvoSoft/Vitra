name: Build and Validate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=high

    - name: Run Lint
      run: npm run lint

    - name: Run Build
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Check Bundle Size
      run: npm run size

    - name: Verify Build Artifacts
      shell: bash
      run: |
        if [ ! -f dist/vitra.min.css ]; then
          echo "Build failed: dist/vitra.min.css not found!"
          exit 1
        fi
        if [ ! -f dist/vitra.min.js ]; then
          echo "Build failed: dist/vitra.min.js not found!"
          exit 1
        fi
        echo "Build succeeded."
