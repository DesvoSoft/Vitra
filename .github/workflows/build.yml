name: Build and Validate

on:
  push:
    branches: [ "main", "demo" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

    - name: Verify Build Artifacts
      run: |
        if [ ! -f dist/vitra.min.css ]; then
          echo "Build failed: dist/vitra.min.css not found!"
          exit 1
        fi
        if [ ! -f dist/vitra.min.js ]; then
          echo "Build failed: dist/vitra.min.js not found!"
          exit 1
        fi
        echo "Build succeeded."
